<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>উপস্থিতি সিস্টেম</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e1a;--surface:#111827;--card:#1a2236;--border:#2a3a5c;
  --accent:#3b82f6;--accent2:#06b6d4;--green:#10b981;--yellow:#f59e0b;
  --red:#ef4444;--text:#e2e8f0;--muted:#64748b;--r:16px;--rs:10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:'Hind Siliguri',sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
.bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(59,130,246,.03) 1px,transparent 1px),
  linear-gradient(90deg,rgba(59,130,246,.03) 1px,transparent 1px);background-size:40px 40px}
.glow{position:fixed;z-index:0;pointer-events:none;border-radius:50%;filter:blur(80px);opacity:.12}
.glow1{width:400px;height:400px;top:-100px;left:-100px;background:var(--accent)}
.glow2{width:300px;height:300px;bottom:-80px;right:-80px;background:var(--accent2)}
.app{position:relative;z-index:1;min-height:100vh;max-width:430px;margin:0 auto;display:flex;flex-direction:column}
.header{padding:20px 20px 0;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px}
.logo-text{font-size:1.1rem;font-weight:700}
.logo-sub{font-size:.7rem;color:var(--muted);font-family:'JetBrains Mono',monospace}
.clock{background:var(--card);border:1px solid var(--border);border-radius:20px;
  padding:6px 14px;font-family:'JetBrains Mono',monospace;font-size:.85rem;color:var(--accent2);letter-spacing:1px}
.nav{display:flex;gap:4px;margin:14px 20px 0;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--r);padding:4px}
.nb{flex:1;padding:10px 4px;border:none;outline:none;cursor:pointer;background:transparent;
  color:var(--muted);font-family:'Hind Siliguri',sans-serif;font-size:.78rem;border-radius:12px;
  transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:3px}
.nb .ic{font-size:1.1rem}
.nb.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.page{display:none;padding:20px;flex:1;animation:fadeUp .25s ease}
.page.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.win{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:16px}
.win-title{font-size:.7rem;font-family:'JetBrains Mono',monospace;color:var(--muted);
  text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.win-title::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.srow{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--rs);font-size:.88rem;font-weight:500}
.srow.present{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.25);color:var(--green)}
.srow.late{background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.25);color:var(--yellow)}
.srow.closed{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);color:var(--red)}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.present .sdot{background:var(--green)}.late .sdot{background:var(--yellow)}.closed .sdot{background:var(--red)}
.fg{margin-bottom:14px}
.fl{display:block;font-size:.8rem;color:var(--muted);margin-bottom:6px;font-weight:500}
.fi{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--rs);
  padding:12px 14px;color:var(--text);font-family:'Hind Siliguri',sans-serif;font-size:1rem;
  outline:none;transition:border-color .2s,box-shadow .2s;letter-spacing:1px}
.fi:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.fi::placeholder{color:var(--muted);letter-spacing:0}
.fi-pin{letter-spacing:6px;font-family:'JetBrains Mono',monospace;font-size:1.2rem}
.ucard{background:linear-gradient(135deg,rgba(59,130,246,.12),rgba(6,182,212,.08));
  border:1.5px solid rgba(59,130,246,.3);border-radius:var(--r);padding:16px;
  display:flex;align-items:center;gap:14px;margin-bottom:16px;animation:slideIn .3s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.uavatar{width:52px;height:52px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0}
.uname{font-size:1.05rem;font-weight:600}
.uid{font-size:.75rem;font-family:'JetBrains Mono',monospace;color:var(--muted);margin-top:2px}
.camwrap{position:relative;border-radius:var(--r);overflow:hidden;background:#000;
  aspect-ratio:3/4;max-height:300px;margin-bottom:14px;border:2px solid var(--border)}
#video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1);display:block}
#canvas{display:none}
.face-guide{width:150px;height:190px;border:2px dashed rgba(59,130,246,.6);
  border-radius:50% 50% 50% 50%/60% 60% 40% 40%;position:absolute;
  top:50%;left:50%;transform:translate(-50%,-50%)}
.prevwrap{border-radius:var(--r);overflow:hidden;margin-bottom:12px;border:2px solid var(--green);max-height:300px}
.prevwrap img{width:100%;height:100%;object-fit:cover;display:block}
.prev-meta{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);
  padding:8px 12px;border-radius:var(--rs);font-size:.78rem;color:var(--green);
  margin-bottom:12px;font-family:'JetBrains Mono',monospace;text-align:center}
.btn{width:100%;padding:13px;border:none;outline:none;cursor:pointer;border-radius:var(--rs);
  font-family:'Hind Siliguri',sans-serif;font-size:1rem;font-weight:600;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:8px}
.btn:active{transform:scale(.97)}
.bp{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 20px rgba(59,130,246,.3)}
.bs{background:linear-gradient(135deg,var(--green),#059669);color:#fff;box-shadow:0 4px 20px rgba(16,185,129,.3)}
.bg_{background:var(--surface);border:1.5px solid var(--border);color:var(--text)}
.btn-sm{width:auto;padding:8px 20px;font-size:.85rem}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.brow{display:flex;gap:10px;margin-bottom:12px}
.brow .btn{flex:1}
.admin-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;
  background:linear-gradient(135deg,rgba(245,158,11,.2),rgba(239,68,68,.2));
  border:1px solid rgba(245,158,11,.4);border-radius:20px;font-size:.75rem;color:var(--yellow);font-weight:600}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;
  display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px)}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:28px;width:100%;max-width:360px;animation:slideIn .3s ease}
.modal h2{font-size:1.2rem;font-weight:700;margin-bottom:6px}
.modal p{font-size:.85rem;color:var(--muted);margin-bottom:20px}
.twrap{overflow-x:auto;border-radius:var(--r);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:.82rem;min-width:340px}
thead tr{background:linear-gradient(90deg,#111827,#1a2236)}
thead th{padding:12px 10px;text-align:left;font-size:.72rem;font-weight:600;
  color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
tbody tr{border-top:1px solid var(--border);transition:background .15s}
tbody tr:hover{background:rgba(59,130,246,.05)}
tbody td{padding:10px;vertical-align:middle}
.idbadge{font-family:'JetBrains Mono',monospace;font-size:.72rem;background:var(--surface);
  border:1px solid var(--border);padding:2px 8px;border-radius:6px}
.chip{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:600}
.cg{background:rgba(16,185,129,.15);color:var(--green)}
.cy{background:rgba(245,158,11,.15);color:var(--yellow)}
.cr{background:rgba(239,68,68,.15);color:var(--red)}
.sgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
.sbox{background:var(--card);border:1.5px solid var(--border);border-radius:var(--rs);padding:14px 10px;text-align:center}
.sval{font-size:1.8rem;font-weight:700;line-height:1;margin-bottom:4px}
.slbl{font-size:.72rem;color:var(--muted)}
.sbox.sg{border-color:rgba(16,185,129,.3)}.sbox.sg .sval{color:var(--green)}
.sbox.sy{border-color:rgba(245,158,11,.3)}.sbox.sy .sval{color:var(--yellow)}
.sbox.sr{border-color:rgba(239,68,68,.3)}.sbox.sr .sval{color:var(--red)}
.rlist{display:flex;flex-direction:column;gap:6px}
.ritem{display:flex;align-items:center;gap:12px;background:var(--card);
  border:1px solid var(--border);border-radius:var(--rs);padding:10px 14px}
.rdate{flex:1;font-size:.82rem}
.rday{font-size:.7rem;color:var(--muted)}
.rtime{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--muted)}
.success-sc{display:none;text-align:center;padding:28px 20px;animation:slideIn .4s ease}
.success-sc.show{display:block}
.ckmark{width:80px;height:80px;background:linear-gradient(135deg,var(--green),#059669);border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:2.2rem;margin:0 auto 18px;
  box-shadow:0 8px 32px rgba(16,185,129,.4);animation:pop .4s ease}
.ckmark.late{background:linear-gradient(135deg,var(--yellow),#d97706);box-shadow:0 8px 32px rgba(245,158,11,.4)}
@keyframes pop{0%{transform:scale(0)}80%{transform:scale(1.15)}100%{transform:scale(1)}}
.sc-title{font-size:1.5rem;font-weight:700;margin-bottom:6px}
.sc-sub{font-size:.9rem;color:var(--muted);margin-bottom:22px}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--card);border:1px solid var(--border);border-radius:20px;padding:12px 24px;
  font-size:.88rem;max-width:340px;width:90%;text-align:center;z-index:999;
  transition:transform .3s ease;box-shadow:0 8px 32px rgba(0,0,0,.4)}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast.success{border-color:var(--green);color:var(--green)}
#toast.error{border-color:var(--red);color:var(--red)}
#toast.info{border-color:var(--accent);color:var(--accent)}
.loader{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.mpick{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.mpick label{font-size:.8rem;color:var(--muted);white-space:nowrap}
.mpick input{flex:1;background:var(--surface);border:1.5px solid var(--border);
  border-radius:var(--rs);padding:10px 12px;color:var(--text);
  font-family:'Hind Siliguri',sans-serif;font-size:.88rem;outline:none}
.mpick input:focus{border-color:var(--accent)}
.srch{position:relative;margin-bottom:12px}
.srch input{width:100%;background:var(--surface);border:1.5px solid var(--border);
  border-radius:var(--rs);padding:10px 14px 10px 38px;color:var(--text);
  font-family:'Hind Siliguri',sans-serif;font-size:.9rem;outline:none}
.srch input:focus{border-color:var(--accent)}
.srch-ic{position:absolute;left:12px;top:50%;transform:translateY(-50%);pointer-events:none}
.empty{text-align:center;padding:36px 20px;color:var(--muted)}
.empty .ic{font-size:2.4rem;margin-bottom:10px}
.empty p{font-size:.88rem}
.err-box{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.3);
  border-radius:var(--rs);padding:10px 14px;font-size:.78rem;color:var(--red);
  margin-top:10px;line-height:1.6}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="glow glow1"></div>
<div class="glow glow2"></div>

<!-- ADMIN MODAL -->
<div class="modal-overlay" id="adminModal" style="display:none">
  <div class="modal">
    <h2>🔐 অ্যাডমিন লগইন</h2>
    <p>অ্যাডমিন আইডি ও পিন দিন</p>
    <div class="fg">
      <label class="fl">অ্যাডমিন আইডি</label>
      <input type="text" id="adminIdInput" class="fi" placeholder="Admin ID"
        autocapitalize="characters" oninput="this.value=this.value.toUpperCase()">
    </div>
    <div class="fg">
      <label class="fl">পিন</label>
      <input type="password" id="adminPinInput" class="fi fi-pin" placeholder="••••" maxlength="8"
        onkeydown="if(event.key==='Enter')doAdminLogin()">
    </div>
    <div class="brow">
      <button class="btn bp" id="adminLoginBtn" onclick="doAdminLogin()">লগইন করুন</button>
      <button class="btn bg_" onclick="closeAdminModal()">বাতিল</button>
    </div>
    <div id="adminLoginErr" class="err-box" style="display:none"></div>
  </div>
</div>

<div class="app">
  <div class="header">
    <div class="logo">
      <div class="logo-icon">📋</div>
      <div>
        <div class="logo-text">উপস্থিতি</div>
        <div class="logo-sub">ATTENDANCE SYSTEM</div>
      </div>
    </div>
    <div class="clock" id="liveClock">--:--:--</div>
  </div>

  <div class="nav">
    <button class="nb active" onclick="showPage('attend')" id="nb-attend">
      <span class="ic">📸</span><span>উপস্থিতি</span>
    </button>
    <button class="nb" onclick="showPage('summary')" id="nb-summary">
      <span class="ic">📊</span><span>মাসিক</span>
    </button>
    <button class="nb" onclick="showPage('personal')" id="nb-personal">
      <span class="ic">👤</span><span>আমার</span>
    </button>
  </div>

  <!-- ══ PAGE 1: উপস্থিতি ══ -->
  <div class="page active" id="page-attend">
    <div class="win">
      <div class="win-title">আজকের সময় অবস্থা</div>
      <div id="attStatus" class="srow closed">
        <div class="sdot"></div>
        <span id="attStatusTxt">লোড হচ্ছে...</span>
      </div>
      <div style="font-size:.72rem;color:var(--muted);margin-top:8px;text-align:center" id="svrDate"></div>
    </div>

    <!-- STEP 1 -->
    <div id="s1">
      <div class="fg">
        <label class="fl">আপনার আইডি লিখুন</label>
        <input type="text" id="idInp" class="fi" placeholder="যেমন: EMP001"
          autocomplete="off" autocapitalize="characters"
          oninput="this.value=this.value.toUpperCase()"
          onkeydown="if(event.key==='Enter')checkId()"
          list="savedIds">
        <datalist id="savedIds"></datalist>
      </div>
      <button class="btn bp" id="checkIdBtn" onclick="checkId()">আইডি যাচাই করুন →</button>
    </div>

    <!-- STEP 2 -->
    <div id="s2" style="display:none">
      <div class="ucard">
        <div class="uavatar">👤</div>
        <div>
          <div class="uname" id="uName"></div>
          <div class="uid"   id="uId"></div>
        </div>
      </div>

      <div id="camSec">
        <div class="camwrap">
          <video id="video" autoplay playsinline muted></video>
          <div class="face-guide"></div>
        </div>
        <canvas id="canvas"></canvas>
        <div class="brow">
          <button class="btn bp" onclick="capturePhoto()">📸 সেলফি তুলুন</button>
          <button class="btn bg_" onclick="goBack()">← ফিরুন</button>
        </div>
      </div>

      <div id="prevSec" style="display:none">
        <div class="prevwrap"><img id="prevImg" src="" alt="selfie"></div>
        <div class="prev-meta" id="prevMeta"></div>
        <div class="brow">
          <button class="btn bs" id="submitBtn" onclick="submitAtt()">✅ জমা দিন</button>
          <button class="btn bg_" onclick="retake()">🔄 আবার তুলুন</button>
        </div>
        <button class="btn bg_" style="margin-top:0" onclick="goBack()">← পিছে যান</button>
      </div>
    </div>

    <!-- সফলতার স্ক্রিন -->
    <div class="success-sc" id="succSc">
      <div class="ckmark" id="succIco">✓</div>
      <div class="sc-title" id="succTitle"></div>
      <div class="sc-sub"   id="succSub"></div>
      <button class="btn bg_ btn-sm" style="width:auto;margin:0 auto" onclick="resetAttend()">
        🔄 নতুন উপস্থিতি
      </button>
    </div>
  </div>

  <!-- ══ PAGE 2: মাসিক রিপোর্ট ══ -->
  <div class="page" id="page-summary">
    <div id="adminGate">
      <div class="empty">
        <div class="ic">🔐</div>
        <p>মাসিক রিপোর্ট দেখতে অ্যাডমিন লগইন করুন</p>
      </div>
      <button class="btn bp" style="margin-top:8px" onclick="openAdminModal()">
        অ্যাডমিন লগইন করুন
      </button>
    </div>
    <div id="adminPanel" style="display:none">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <span class="admin-badge">👑 অ্যাডমিন মোড</span>
        <button class="btn bg_ btn-sm" style="width:auto" onclick="adminLogout()">লগআউট</button>
      </div>
      <div class="mpick">
        <label>মাস:</label>
        <input type="month" id="sumMonth">
        <button class="btn bp btn-sm" onclick="loadSummary()">দেখুন</button>
      </div>
      <div class="srch">
        <span class="srch-ic">🔍</span>
        <input type="text" id="sumSearch" placeholder="নাম বা আইডি..." oninput="filterTable()">
      </div>
      <div class="twrap" id="sumWrap">
        <div class="empty"><div class="ic">📊</div><p>মাস বেছে "দেখুন" চাপুন</p></div>
      </div>
    </div>
  </div>

  <!-- ══ PAGE 3: আমার রেকর্ড ══ -->
  <div class="page" id="page-personal">
    <div class="fg">
      <label class="fl">আপনার আইডি</label>
      <input type="text" id="perIdInp" class="fi" placeholder="যেমন: EMP001"
        autocomplete="off" autocapitalize="characters"
        oninput="this.value=this.value.toUpperCase()"
        onkeydown="if(event.key==='Enter')loadPersonal()"
        list="savedIds2">
      <datalist id="savedIds2"></datalist>
    </div>
    <div class="mpick" style="margin-bottom:14px">
      <label>মাস:</label>
      <input type="month" id="perMonth">
      <button class="btn bp btn-sm" onclick="loadPersonal()">দেখুন</button>
    </div>
    <div id="perResult">
      <div class="empty"><div class="ic">👤</div><p>আইডি ও মাস দিয়ে আপনার রেকর্ড দেখুন</p></div>
    </div>
  </div>

</div><!-- /.app -->
<div id="toast"></div>

<script>
// ════════════════════════════════════════════════
//  ▼▼▼  এখানে আপনার GAS Web App URL বসান  ▼▼▼
// ════════════════════════════════════════════════
var GAS_URL = 'https://script.google.com/macros/s/AKfycbwDCbjg7MZayBGFEMrlwo3F-nYVpAiao_DOd8iitA1anjiIHLF-IJX4I2SFjbxD6FLD/exec';
// ════════════════════════════════════════════════

// ══ STATE ══
var CU = null, photo = null, stream = null;
var summaryData = [];
var adminLoggedIn = false;
var adminCred = { id: '', pin: '' };

// ════════════════════════════════════════════════
//  JSONP API CALL
//  GitHub Pages → GAS (CORS ছাড়া)
// ════════════════════════════════════════════════
function callGAS(action, params) {
  params = params || {};
  return new Promise(function(resolve, reject) {
    var cbName = 'gcb_' + Date.now() + '_' + Math.floor(Math.random() * 9999);
    var script = document.createElement('script');
    var done   = false;

    // Timeout — ১৫ সেকেন্ড
    var timer = setTimeout(function() {
      if (done) return;
      done = true;
      cleanup();
      reject(new Error('সময় শেষ (timeout) — আবার চেষ্টা করুন'));
    }, 15000);

    // Callback
    window[cbName] = function(data) {
      if (done) return;
      done = true;
      clearTimeout(timer);
      cleanup();
      resolve(data);
    };

    function cleanup() {
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }

    // URL তৈরি
    var url = GAS_URL
      + '?callback=' + encodeURIComponent(cbName)
      + '&action='   + encodeURIComponent(action)
      + '&data='     + encodeURIComponent(JSON.stringify(params))
      + '&_t='       + Date.now(); // cache bust

    script.src     = url;
    script.async   = true;
    script.onerror = function() {
      if (done) return;
      done = true;
      clearTimeout(timer);
      cleanup();
      reject(new Error('GAS সংযোগ ব্যর্থ — URL সঠিক কিনা দেখুন'));
    };

    document.body.appendChild(script);
  });
}

// ════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', function() {
  setMonths();
  loadSavedIds();
  startClock();

  // সার্ভার থেকে সময় ও তারিখ আনা
  callGAS('getServerTime')
    .then(function(d) {
      if (d && d.display) {
        document.getElementById('svrDate').textContent = '📅 ' + d.display;
      }
      if (d && typeof d.hour !== 'undefined') {
        updateStatus(d.hour, d.minute);
      }
    })
    .catch(function() {
      document.getElementById('svrDate').textContent = '⚠️ সার্ভার সংযোগ পাওয়া যাচ্ছে না';
    });
});

// ══ মাস ডিফল্ট ══
function setMonths() {
  var n = new Date();
  var v = n.getFullYear() + '-' + String(n.getMonth() + 1).padStart(2, '0');
  document.getElementById('sumMonth').value = v;
  document.getElementById('perMonth').value = v;
}

// ══ লাইভ ক্লক ══
function startClock() {
  function tick() {
    var n = new Date();
    document.getElementById('liveClock').textContent =
      pad(n.getHours()) + ':' + pad(n.getMinutes()) + ':' + pad(n.getSeconds());
    updateStatus(n.getHours(), n.getMinutes());
  }
  tick();
  setInterval(tick, 1000);
}
function pad(x) { return String(x).padStart(2, '0'); }

// ══ সময় অবস্থা ══
function updateStatus(h, m) {
  var el = document.getElementById('attStatus');
  var tx = document.getElementById('attStatusTxt');
  var t  = h * 60 + m;
  el.className = 'srow';
  if (t >= 9 * 60 + 30 && t <= 10 * 60 + 30) {
    el.classList.add('present');
    tx.textContent = '✅ সময়মতো উপস্থিতি দেওয়া যাবে (৯:৩০ – ১০:৩০)';
  } else if (t > 10 * 60 + 30) {
    el.classList.add('late');
    tx.textContent = '⚠️ এখন দিলে লেট হিসাবে গণনা হবে';
  } else {
    el.classList.add('closed');
    tx.textContent = '⏳ সময় শুরু হয়নি (৯:৩০ থেকে শুরু)';
  }
}

// ══ পেজ নেভিগেশন ══
function showPage(id) {
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.nb').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('page-' + id).classList.add('active');
  document.getElementById('nb-' + id).classList.add('active');
  if (id !== 'attend') stopCamera();
}

// ══ সেভ করা আইডি ══
function loadSavedIds() {
  var ids = getSavedIds();
  ['savedIds', 'savedIds2'].forEach(function(dl) {
    var el = document.getElementById(dl);
    if (el) el.innerHTML = ids.map(function(id) {
      return '<option value="' + id + '">';
    }).join('');
  });
}
function getSavedIds() {
  try { return JSON.parse(localStorage.getItem('att_ids') || '[]'); } catch(e) { return []; }
}
function saveId(id) {
  var ids = getSavedIds();
  var i   = ids.indexOf(id);
  if (i > -1) ids.splice(i, 1);
  ids.unshift(id);
  if (ids.length > 10) ids.pop();
  localStorage.setItem('att_ids', JSON.stringify(ids));
  loadSavedIds();
}

// ════════════════════════════════════════════════
//  STEP 1: আইডি যাচাই
// ════════════════════════════════════════════════
function checkId() {
  var id = document.getElementById('idInp').value.trim().toUpperCase();
  if (!id) { toast('আইডি লিখুন', 'error'); return; }

  var btn = document.getElementById('checkIdBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="loader"></div> যাচাই হচ্ছে...';

  callGAS('validateUser', { userId: id })
    .then(function(r) {
      btn.disabled = false;
      btn.innerHTML = 'আইডি যাচাই করুন →';
      if (r && r.success) {
        CU = r;
        saveId(r.id);
        document.getElementById('uName').textContent = r.name;
        document.getElementById('uId').textContent   = '🪪 ' + r.id;
        document.getElementById('s1').style.display  = 'none';
        document.getElementById('s2').style.display  = 'block';
        startCamera();
      } else {
        toast((r && r.message) ? r.message : 'আইডি পাওয়া যায়নি', 'error');
      }
    })
    .catch(function(e) {
      btn.disabled = false;
      btn.innerHTML = 'আইডি যাচাই করুন →';
      toast(e.message, 'error');
    });
}

// ════════════════════════════════════════════════
//  CAMERA
// ════════════════════════════════════════════════
function startCamera() {
  navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
    audio: false
  })
  .then(function(s) {
    stream = s;
    var v  = document.getElementById('video');
    v.srcObject = s;
    document.getElementById('camSec').style.display  = 'block';
    document.getElementById('prevSec').style.display = 'none';
  })
  .catch(function(e) {
    toast('ক্যামেরা চালু হয়নি: ' + e.message, 'error');
  });
}

function stopCamera() {
  if (stream) {
    stream.getTracks().forEach(function(t) { t.stop(); });
    stream = null;
  }
}

// ══ সেলফি তোলা ══
function capturePhoto() {
  var v   = document.getElementById('video');
  var c   = document.getElementById('canvas');
  c.width  = v.videoWidth  || 640;
  c.height = v.videoHeight || 480;
  var ctx  = c.getContext('2d');

  // মিরর ঠিক করে আঁকা
  ctx.save();
  ctx.scale(-1, 1);
  ctx.drawImage(v, -c.width, 0, c.width, c.height);
  ctx.restore();

  // টাইমস্ট্যাম্প ওভারলে
  var now = new Date();
  var ts  = pad(now.getDate()) + '/' + pad(now.getMonth() + 1) + '/' + now.getFullYear()
          + '  ' + pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());

  ctx.fillStyle = 'rgba(0,0,0,.65)';
  ctx.fillRect(0, c.height - 38, c.width, 38);
  ctx.fillStyle   = '#ffffff';
  ctx.font        = 'bold 13px monospace';
  ctx.textAlign   = 'right';
  ctx.fillText(ts + '  ' + (CU ? CU.id : ''), c.width - 10, c.height - 12);

  photo = c.toDataURL('image/jpeg', 0.82);

  document.getElementById('prevImg').src       = photo;
  document.getElementById('prevMeta').textContent = '📸 ' + ts + '  •  ' + (CU ? CU.name : '');
  document.getElementById('camSec').style.display  = 'none';
  document.getElementById('prevSec').style.display = 'block';
  stopCamera();
}

function retake() {
  photo = null;
  document.getElementById('prevSec').style.display = 'none';
  startCamera();
}

// ════════════════════════════════════════════════
//  উপস্থিতি জমা দেওয়া
// ════════════════════════════════════════════════
function submitAtt() {
  if (!photo || !CU) { toast('আগে সেলফি তুলুন', 'error'); return; }

  var btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="loader"></div> জমা হচ্ছে...';

  callGAS('submitAttendance', { userId: CU.id, name: CU.name, photoBase64: photo })
    .then(function(r) {
      btn.disabled = false;
      btn.innerHTML = '✅ জমা দিন';

      if (r && r.success) {
        document.getElementById('s2').style.display = 'none';
        var sc  = document.getElementById('succSc');
        var ico = document.getElementById('succIco');
        sc.classList.add('show');

        if (r.status === 'Present') {
          ico.className   = 'ckmark';
          ico.textContent = '✓';
          document.getElementById('succTitle').textContent = '✅ সময়মতো উপস্থিতি!';
        } else {
          ico.className   = 'ckmark late';
          ico.textContent = '⚠';
          document.getElementById('succTitle').textContent = '⚠️ লেট উপস্থিতি!';
        }
        document.getElementById('succSub').textContent =
          (CU ? CU.name : '') + ' • ' + r.date + ' • ' + r.time;

        toast(
          r.status === 'Present' ? 'উপস্থিতি সফলভাবে জমা হয়েছে ✅' : 'লেট উপস্থিতি জমা হয়েছে ⚠️',
          r.status === 'Present' ? 'success' : 'info'
        );
      } else {
        toast((r && r.message) ? r.message : 'জমা হয়নি, আবার চেষ্টা করুন', 'error');
      }
    })
    .catch(function(e) {
      btn.disabled = false;
      btn.innerHTML = '✅ জমা দিন';
      toast(e.message, 'error');
    });
}

function resetAttend() {
  CU = null; photo = null; stopCamera();
  document.getElementById('s1').style.display      = 'block';
  document.getElementById('s2').style.display      = 'none';
  document.getElementById('succSc').classList.remove('show');
  document.getElementById('camSec').style.display  = 'block';
  document.getElementById('prevSec').style.display = 'none';
  document.getElementById('idInp').value = '';
}

function goBack() {
  stopCamera(); CU = null; photo = null;
  document.getElementById('s1').style.display = 'block';
  document.getElementById('s2').style.display = 'none';
}

// ════════════════════════════════════════════════
//  ADMIN
// ════════════════════════════════════════════════
function openAdminModal() {
  document.getElementById('adminModal').style.display    = 'flex';
  document.getElementById('adminIdInput').value          = '';
  document.getElementById('adminPinInput').value         = '';
  document.getElementById('adminLoginErr').style.display = 'none';
  setTimeout(function() { document.getElementById('adminIdInput').focus(); }, 150);
}
function closeAdminModal() {
  document.getElementById('adminModal').style.display = 'none';
}

function doAdminLogin() {
  var id  = document.getElementById('adminIdInput').value.trim().toUpperCase();
  var pin = document.getElementById('adminPinInput').value.trim();
  if (!id || !pin) { showAdminErr('আইডি ও পিন দুটোই দিন'); return; }

  var btn = document.getElementById('adminLoginBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="loader"></div> লগইন...';

  callGAS('adminLogin', { id: id, pin: pin })
    .then(function(r) {
      btn.disabled = false;
      btn.innerHTML = 'লগইন করুন';
      if (r && r.success) {
        adminLoggedIn = true;
        adminCred     = { id: id, pin: pin };
        closeAdminModal();
        document.getElementById('adminGate').style.display  = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        toast('অ্যাডমিন লগইন সফল 👑', 'success');
      } else {
        showAdminErr((r && r.message) ? r.message : 'ভুল আইডি বা পিন');
      }
    })
    .catch(function(e) {
      btn.disabled = false;
      btn.innerHTML = 'লগইন করুন';
      showAdminErr(e.message);
    });
}

function showAdminErr(msg) {
  var el = document.getElementById('adminLoginErr');
  el.textContent    = '❌ ' + msg;
  el.style.display  = 'block';
}

function adminLogout() {
  adminLoggedIn = false;
  adminCred     = { id: '', pin: '' };
  summaryData   = [];
  document.getElementById('adminPanel').style.display = 'none';
  document.getElementById('adminGate').style.display  = 'block';
  document.getElementById('sumWrap').innerHTML =
    '<div class="empty"><div class="ic">📊</div><p>মাস বেছে "দেখুন" চাপুন</p></div>';
  toast('লগআউট হয়েছে', 'info');
}

// ════════════════════════════════════════════════
//  মাসিক সারসংক্ষেপ
// ════════════════════════════════════════════════
function loadSummary() {
  var month = document.getElementById('sumMonth').value;
  if (!month) { toast('মাস বেছে নিন', 'error'); return; }

  var wrap = document.getElementById('sumWrap');
  wrap.innerHTML = '<div class="empty">' +
    '<div class="loader" style="border-top-color:var(--accent);margin:0 auto 10px"></div>' +
    '<p>লোড হচ্ছে...</p></div>';

  callGAS('getMonthlySummary', {
    monthStr: month,
    adminId:  adminCred.id,
    adminPin: adminCred.pin
  })
  .then(function(r) {
    if (!r || !r.success) {
      toast((r && r.message) ? r.message : 'লোড করা যায়নি', 'error');
      return;
    }
    summaryData = r.data || [];
    renderTable(summaryData);
  })
  .catch(function(e) { toast(e.message, 'error'); });
}

function renderTable(data) {
  var wrap = document.getElementById('sumWrap');
  if (!data || !data.length) {
    wrap.innerHTML = '<div class="empty"><div class="ic">📭</div><p>এই মাসে কোনো রেকর্ড নেই</p></div>';
    return;
  }
  var html = '<table><thead><tr>' +
    '<th>আইডি</th><th>নাম</th><th>উপস্থিত</th><th>লেট</th><th>অনুপস্থিত</th>' +
    '</tr></thead><tbody>';
  data.forEach(function(r) {
    html += '<tr>' +
      '<td><span class="idbadge">' + esc(r.id)   + '</span></td>' +
      '<td>' + esc(r.name) + '</td>' +
      '<td><span class="chip cg">' + r.present + '</span></td>' +
      '<td><span class="chip cy">' + r.late    + '</span></td>' +
      '<td><span class="chip cr">' + r.absent  + '</span></td>' +
      '</tr>';
  });
  html += '</tbody></table>';
  wrap.innerHTML = html;
}

function filterTable() {
  var q = document.getElementById('sumSearch').value.toLowerCase();
  renderTable(summaryData.filter(function(r) {
    return r.id.toLowerCase().includes(q) || r.name.toLowerCase().includes(q);
  }));
}

// ════════════════════════════════════════════════
//  ব্যক্তিগত রেকর্ড
// ════════════════════════════════════════════════
function loadPersonal() {
  var id    = document.getElementById('perIdInp').value.trim().toUpperCase();
  var month = document.getElementById('perMonth').value;
  if (!id)    { toast('আইডি লিখুন', 'error');  return; }
  if (!month) { toast('মাস বেছে নিন', 'error'); return; }

  var wrap = document.getElementById('perResult');
  wrap.innerHTML = '<div class="empty">' +
    '<div class="loader" style="border-top-color:var(--accent);margin:0 auto 10px"></div>' +
    '<p>লোড হচ্ছে...</p></div>';

  callGAS('getPersonalRecord', { userId: id, monthStr: month })
    .then(function(r) {
      if (!r || !r.success) {
        toast((r && r.message) ? r.message : 'লোড করা যায়নি', 'error');
        return;
      }
      if (!r.records || !r.records.length) {
        wrap.innerHTML = '<div class="empty"><div class="ic">📭</div><p>এই মাসে কোনো রেকর্ড নেই</p></div>';
        return;
      }
      saveId(id);
      var html =
        '<div style="margin-bottom:12px;font-weight:600;font-size:.9rem;color:var(--muted)">' +
        '👤 ' + esc(r.name) + ' — ' + month + '</div>' +
        '<div class="sgrid">' +
          '<div class="sbox sg"><div class="sval">' + r.present + '</div><div class="slbl">উপস্থিত</div></div>' +
          '<div class="sbox sy"><div class="sval">' + r.late    + '</div><div class="slbl">লেট</div></div>' +
          '<div class="sbox sr"><div class="sval">' + r.absent  + '</div><div class="slbl">অনুপস্থিত</div></div>' +
        '</div><div class="rlist">';

      r.records.forEach(function(rec) {
        var cls = rec.status === 'Present' ? 'cg' : rec.status === 'Late' ? 'cy' : 'cr';
        var lbl = rec.status === 'Present' ? 'উপস্থিত' : rec.status === 'Late' ? 'লেট' : 'অনুপস্থিত';
        html += '<div class="ritem">' +
          '<div style="flex:1">' +
            '<div class="rdate">' + esc(rec.date) + '</div>' +
            '<div class="rday">'  + esc(rec.day  || '') + '</div>' +
          '</div>' +
          '<span class="chip ' + cls + '">' + lbl + '</span>' +
          '<div class="rtime">' + esc(rec.time || '') + '</div>' +
          '</div>';
      });
      html += '</div>';
      wrap.innerHTML = html;
    })
    .catch(function(e) { toast(e.message, 'error'); });
}

// ════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════
function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

var toastTimer;
function toast(msg, type) {
  type = type || 'info';
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.classList.remove('show'); }, 3500);
}
